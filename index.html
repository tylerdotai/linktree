<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Delano | Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        .profile {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            border: 3px solid rgba(255,255,255,0.3);
        }
        
        .name {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .tagline {
            color: #a0a0a0;
            font-size: 14px;
        }
        
        .links {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .link {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 24px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s ease;
        }
        
        .link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .link-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .link-text {
            flex: 1;
        }
        
        .link-title {
            font-weight: 600;
            font-size: 16px;
        }
        
        .link-desc {
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 2px;
        }
        
        .footer {
            margin-top: 40px;
            color: #606060;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="profile">
        <img src="avatar.jpg" alt="Tyler Delano" class="avatar">
        <div class="name">Tyler Delano</div>
        <div class="tagline">Builder. Founder. AI Engineer.</div>
    </div>
    
    <div class="links">
        <a href="https://www.clawplex.dev" class="link" target="_blank">
            <div class="link-icon">🦞</div>
            <div class="link-text">
                <div class="link-title">Clawplex</div>
                <div class="link-desc">DFW AI Community</div>
            </div>
        </a>
        
        <a href="https://flume.sh" class="link" target="_blank">
            <div class="link-icon">⚡</div>
            <div class="link-text">
                <div class="link-title">Flume.sh</div>
                <div class="link-desc">Autonomous SaaS Factory</div>
            </div>
        </a>
        
        <a href="https://linkedin.com/in/tylerpdelano" class="link" target="_blank">
            <div class="link-icon">💼</div>
            <div class="link-text">
                <div class="link-title">LinkedIn</div>
                <div class="link-desc">Connect with me</div>
            </div>
        </a>
        
        <a href="https://twitter.com/tylerdotai" class="link" target="_blank">
            <div class="link-icon">🐦</div>
            <div class="link-text">
                <div class="link-title">Twitter / X</div>
                <div class="link-desc">@tylerdotai</div>
            </div>
        </a>
        
        <a href="https://github.com/tylerdotai" class="link" target="_blank">
            <div class="link-icon">💻</div>
            <div class="link-text">
                <div class="link-title">GitHub</div>
                <div class="link-desc">Code & Projects</div>
            </div>
        </a>
    </div>
    
    <div class="footer">
        Built by Hoss 🤖
    </div>
</body>
</html>
