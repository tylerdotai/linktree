<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Delano | Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0a0a0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.4);
            --text: #ffffff;
            --text-muted: #888888;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at top, rgba(233, 69, 96, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        
        /* Entrance animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px var(--accent-glow); }
        }
        
        .profile {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.6s ease-out;
        }
        
        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }
        
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            animation: glow 3s ease-in-out infinite;
        }
        
        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(45deg, var(--accent), #6366f1, var(--accent)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spin 4s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .name {
            color: var(--text);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .tagline {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .stat-number {
            color: var(--text);
            font-weight: 600;
        }
        
        .links {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .link {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 18px 24px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s ease-out backwards;
        }
        
        .link:nth-child(1) { animation-delay: 0.1s; }
        .link:nth-child(2) { animation-delay: 0.2s; }
        .link:nth-child(3) { animation-delay: 0.3s; }
        .link:nth-child(4) { animation-delay: 0.4s; }
        .link:nth-child(5) { animation-delay: 0.5s; }
        .link:nth-child(6) { animation-delay: 0.6s; }
        
        .link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .link:active {
            transform: translateY(-2px) scale(1.01);
        }
        
        .link-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .link:hover .link-icon {
            background: var(--accent);
            transform: scale(1.1);
        }
        
        .link-text {
            flex: 1;
        }
        
        .link-title {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 2px;
        }
        
        .link-desc {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .link-arrow {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            color: var(--text-muted);
        }
        
        .link:hover .link-arrow {
            opacity: 1;
            transform: translateX(0);
        }
        
        .footer {
            margin-top: 50px;
            color: #444;
            font-size: 13px;
            animation: fadeInUp 0.6s ease-out 0.7s backwards;
        }
        
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        /* Floating particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 8s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 10s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 14s;"></div>
    </div>
    
    <div class="profile">
        <div class="avatar-container">
            <div class="avatar-ring"></div>
            <img src="avatar.jpg" alt="Tyler Delano" class="avatar">
        </div>
        <div class="name">Tyler Delano</div>
        <div class="tagline">Builder. Founder. AI Engineer.</div>
        <div class="stats">
            <div class="stat">
                <span class="stat-number">5</span>
                <span>Repos</span>
            </div>
            <div class="stat">
                <span class="stat-number">1</span>
                <span>Products</span>
            </div>
            <div class="stat">
                <span class="stat-number">∞</span>
                <span>Potential</span>
            </div>
        </div>
    </div>
    
    <div class="links">
        <a href="https://www.clawplex.dev" class="link" target="_blank">
            <div class="link-icon">🦞</div>
            <div class="link-text">
                <div class="link-title">Clawplex</div>
                <div class="link-desc">DFW AI Community</div>
            </div>
            <div class="link-arrow">→</div>
        </a>
        
        <a href="https://flume.sh" class="link" target="_blank">
            <div class="link-icon">⚡</div>
            <div class="link-text">
                <div class="link-title">Flume.sh</div>
                <div class="link-desc">Autonomous SaaS Factory</div>
            </div>
            <div class="link-arrow">→</div>
        </a>
        
        <a href="https://github.com/tylerdotai/lightweight-crm" class="link" target="_blank">
            <div class="link-icon">📊</div>
            <div class="link-text">
                <div class="link-title">Lightweight CRM</div>
                <div class="link-desc">Agent-first Sales Pipeline</div>
            </div>
            <div class="link-arrow">→</div>
        </a>
        
        <a href="https://linkedin.com/in/tylerpdelano" class="link" target="_blank">
            <div class="link-icon">💼</div>
            <div class="link-text">
                <div class="link-title">LinkedIn</div>
                <div class="link-desc">Let's Connect</div>
            </div>
            <div class="link-arrow">→</div>
        </a>
        
        <a href="https://twitter.com/tylerdotai" class="link" target="_blank">
            <div class="link-icon">🐦</div>
            <div class="link-text">
                <div class="link-title">Twitter / X</div>
                <div class="link-desc">@tylerdotai</div>
            </div>
            <div class="link-arrow">→</div>
        </a>
        
        <a href="https://github.com/tylerdotai" class="link" target="_blank">
            <div class="link-icon">💻</div>
            <div class="link-text">
                <div class="link-title">GitHub</div>
                <div class="link-desc">All the Code</div>
            </div>
            <div class="link-arrow">→</div>
        </a>
    </div>
    
    <div class="footer">
        Built by <a href="#">Hoss</a> 🤖
    </div>
</body>
</html>
