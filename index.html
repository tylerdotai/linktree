<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Delano</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gray: #989898;
            --gray-light: #c8c8c8;
            --gray-dark: #585858;
            --bezel: #3a3a48;
            --screen-bg: #0f380f;
            --screen-green: #9bbc0f;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container { display: flex; flex-direction: column; align-items: center; }
        
        /* GAME BOY */
        .gameboy {
            width: 300px;
            background: linear-gradient(180deg, var(--gray-light) 0%, var(--gray) 30%, var(--gray-dark) 100%);
            border-radius: 8px 8px 45px 45px;
            padding: 16px 14px 28px;
            box-shadow: 
                0 0 0 2px #484848,
                0 25px 50px rgba(0,0,0,0.5),
                inset 0 2px 0 rgba(255,255,255,0.25),
                inset 0 -2px 0 rgba(0,0,0,0.1);
        }
        
        /* SCREEN BEZEL - contains LED + screen */
        .screen-bezel {
            background: var(--bezel);
            border-radius: 5px 5px 20px 20px;
            padding: 12px;
            margin-bottom: 18px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            gap: 8px;
        }
        
        /* LED SECTION - inside bezel */
        .led-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            flex-shrink: 0;
        }
        
        .led {
            width: 5px; height: 5px;
            background: #222;
            border-radius: 50%;
        }
        
        .led.on {
            background: #e03030;
            box-shadow: 0 0 6px #e03030, 0 0 10px rgba(224,48,48,0.5);
        }
        
        .led-label {
            font-size: 4px;
            color: #555;
            margin-top: 3px;
        }
        
        /* SCREEN AREA */
        .screen-area {
            flex: 1;
        }
        
        .screen-label-top {
            font-size: 4px;
            color: #555;
            text-align: center;
            margin-bottom: 4px;
        }
        
        .screen-frame {
            background: #1a1a1a;
            border-radius: 2px;
            padding: 2px;
        }
        
        .screen {
            width: 130px;
            height: 110px;
            background: var(--screen-bg);
            position: relative;
        }
        
        .screen-content {
            padding: 6px;
            color: var(--screen-green);
            font-size: 4px;
            line-height: 1.8;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .avatar {
            width: 14px; height: 14px;
            object-fit: cover;
            border-radius: 2px;
            margin-bottom: 2px;
        }
        
        .menu-title {
            font-size: 5px;
            border-bottom: 1px dashed var(--screen-green);
            padding-bottom: 2px;
            margin-bottom: 2px;
            width: 100%;
            text-align: center;
        }
        
        .menu-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            width: 100%;
        }
        
        .menu-item {
            padding: 1px 3px;
            width: 100%;
            text-align: center;
            opacity: 0.5;
        }
        
        .menu-item.selected {
            opacity: 1;
            background: var(--screen-green);
            color: var(--screen-bg);
        }
        
        .menu-footer {
            font-size: 3px;
            margin-top: auto;
            opacity: 0.5;
        }
        
        .screen-label-bottom {
            font-size: 4px;
            color: var(--gray-dark);
            text-align: center;
            margin-top: 4px;
        }
        
        .screen-label-bottom span { color: #4848a0; }
        
        /* CONTROLS */
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
        }
        
        /* D-PAD */
        .dpad { position: relative; width: 65px; height: 65px; }
        
        .dpad-btn {
            position: absolute;
            background: #282828;
            border: none;
            cursor: pointer;
            box-shadow: 0 3px 0 #111, 0 4px 5px rgba(0,0,0,0.3);
        }
        
        .dpad-btn:active, .dpad-btn.pressed { transform: translateY(2px); box-shadow: 0 1px 0 #111; }
        
        .dpad-up { width: 20px; height: 22px; left: 50%; transform: translateX(-50%); top: 0; border-radius: 3px 3px 5px 5px; }
        .dpad-down { width: 20px; height: 22px; left: 50%; transform: translateX(-50%); bottom: 0; border-radius: 5px 5px 3px 3px; }
        .dpad-left { width: 22px; height: 20px; top: 50%; transform: translateY(-50%); left: 0; border-radius: 5px 3px 3px 5px; }
        .dpad-right { width: 22px; height: 20px; top: 50%; transform: translateY(-50%); right: 0; border-radius: 3px 5px 5px 3px; }
        
        .dpad-center {
            position: absolute;
            width: 20px; height: 20px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: #282828;
            border-radius: 50%;
        }
        
        /* A/B */
        .ab-btns { display: flex; gap: 5px; transform: rotate(-12deg); margin-right: 2px; }
        
        .ab-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 7px;
            color: rgba(255,255,255,0.8);
            box-shadow: 0 3px 0 #500828, 0 4px 5px rgba(0,0,0,0.3);
        }
        
        .ab-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #500828; }
        
        .btn-a { background: #a01050; margin-top: 5px; }
        .btn-b { background: #a01050; }
        
        /* START/SELECT */
        .meta-btns {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 16px;
            transform: rotate(-18deg);
        }
        
        .meta-btn {
            width: 24px; height: 6px;
            background: #383838;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 0 #181818;
        }
        
        .meta-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #181818; }
        
        .meta-label {
            font-size: 4px;
            color: var(--gray-dark);
            text-align: center;
            margin-top: 3px;
            letter-spacing: 0.5px;
        }
        
        /* BRANDING */
        .branding {
            text-align: center;
            margin-top: 8px;
        }
        
        .brand { font-size: 5px; color: var(--gray-dark); }
        
        /* VIEW TOGGLE */
        .view-toggle {
            margin-top: 45px;
            background: var(--gray-dark);
            border: none;
            color: #fff;
            padding: 7px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 5px;
            cursor: pointer;
        }
        
        /* LIST VIEW */
        .list-view { display: none; width: 100%; max-width: 340px; }
        .list-view.active { display: block; }
        .list-section { margin-bottom: 10px; }
        .list-title { color: #888; font-size: 5px; margin-bottom: 5px; text-transform: uppercase; }
        .list-link {
            display: block;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 7px 9px;
            color: #fff;
            text-decoration: none;
            font-size: 7px;
            margin-bottom: 3px;
        }
        .list-link:hover { background: rgba(233,69,96,0.2); border-color: #e94560; }
        
        /* BOOT */
        .boot {
            position: fixed;
            inset: 0;
            background: var(--screen-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: bootFade 2.5s ease-out forwards;
        }
        
        @keyframes bootFade { 0%, 70% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
        
        .boot-text { color: var(--screen-green); font-size: 5px; text-align: center; line-height: 2; }
        
        @media (max-width: 330px) { .gameboy { width: 95%; } }
        button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <div class="boot" id="boot"><div class="boot-text">FLUME<br>EST. 2026<br><br>TYLER DELANO</div></div>
    
    <div class="container">
        <div class="gameboy" id="gameboy">
            <!-- Screen Bezel -->
            <div class="screen-bezel">
                <!-- LED inside bezel -->
                <div class="led-section">
                    <div class="led on"></div>
                    <div class="led-label">BATTERY</div>
                </div>
                
                <!-- Screen -->
                <div class="screen-area">
                    <div class="screen-label-top">DOT MATRIX WITH STEREO SOUND</div>
                    <div class="screen-frame">
                        <div class="screen" onclick="handleSelect()">
                            <div class="screen-content">
                                <img src="avatar.jpg" alt="T" class="avatar">
                                <div class="menu-title" id="menuTitle">MENU</div>
                                <div class="menu-items" id="menuItems"></div>
                                <div class="menu-footer" id="menuFooter">A: SEL B: BCK</div>
                            </div>
                        </div>
                    </div>
                    <div class="screen-label-bottom">Nintendo <span>CLAW BOY</span></div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <div class="dpad">
                    <button class="dpad-btn dpad-up" data-dir="up"></button>
                    <button class="dpad-btn dpad-down" data-dir="down"></button>
                    <button class="dpad-btn dpad-left" data-dir="left"></button>
                    <button class="dpad-btn dpad-right" data-dir="right"></button>
                    <div class="dpad-center"></div>
                </div>
                <div class="ab-btns">
                    <button class="ab-btn btn-b" data-action="b">B</button>
                    <button class="ab-btn btn-a" data-action="a">A</button>
                </div>
            </div>
            
            <!-- Start/Select -->
            <div class="meta-btns">
                <div>
                    <button class="meta-btn" data-action="select"></button>
                    <div class="meta-label">SELECT</div>
                </div>
                <div>
                    <button class="meta-btn" data-action="start" id="startBtn"></button>
                    <div class="meta-label">START</div>
                </div>
            </div>
            
            <!-- Branding -->
            <div class="branding"><div class="brand">CLAW BOY</div></div>
        </div>
        
        <button class="view-toggle" onclick="toggleView()">LIST VIEW</button>
        
        <div class="list-view" id="listView">
            <div class="list-section">
                <div class="list-title">Projects</div>
                <a href="https://flume.sh" class="list-link" target="_blank">Flume.sh</a>
                <a href="https://tylerdotai.github.io/personal-site" class="list-link" target="_blank">Terminal</a>
                <a href="https://github.com/tylerdotai/proof" class="list-link" target="_blank">Proof</a>
            </div>
            <div class="list-section">
                <div class="list-title">Community</div>
                <a href="https://www.clawplex.dev" class="list-link" target="_blank">Clawplex</a>
                <a href="https://discord.gg/q8kEquTu3z" class="list-link" target="_blank">Discord</a>
            </div>
            <div class="list-section">
                <div class="list-title">Contact</div>
                <a href="mailto:tyler.delano@icloud.com" class="list-link">Email</a>
            </div>
            <div class="list-section">
                <div class="list-title">Social</div>
                <a href="https://linkedin.com/in/tylerpdelano" class="list-link" target="_blank">LinkedIn</a>
                <a href="https://twitter.com/tylerdotai" class="list-link" target="_blank">Twitter</a>
                <a href="https://github.com/tylerdotai" class="list-link" target="_blank">GitHub</a>
            </div>
            <button class="view-toggle" onclick="toggleView()">CLAW BOY</button>
        </div>
    </div>
    
    <script>
        const menus = {
            main: { title: 'MENU', items: [
                { label: 'Projects', sub: 'projects' },
                { label: 'Community', sub: 'community' },
                { label: 'Contact', sub: 'contact' },
                { label: 'Social', sub: 'social' }
            ]},
            projects: { title: 'PROJECTS', items: [
                { label: 'Flume.sh', url: 'https://flume.sh' },
                { label: 'Terminal', url: 'https://tylerdotai.github.io/personal-site' },
                { label: 'Proof', url: 'https://github.com/tylerdotai/proof' }
            ]},
            community: { title: 'COMMUNITY', items: [
                { label: 'Clawplex', url: 'https://www.clawplex.dev' },
                { label: 'Discord', url: 'https://discord.gg/q8kEquTu3z' }
            ]},
            contact: { title: 'CONTACT', items: [
                { label: 'Email', url: 'mailto:tyler.delano@icloud.com' }
            ]},
            social: { title: 'SOCIAL', items: [
                { label: 'LinkedIn', url: 'https://linkedin.com/in/tylerpdelano' },
                { label: 'Twitter', url: 'https://twitter.com/tylerdotai' },
                { label: 'GitHub', url: 'https://github.com/tylerdotai' }
            ]}
        };
        
        let current = 'main', selected = 0, history = [];
        
        function render() {
            const m = menus[current];
            document.getElementById('menuTitle').textContent = m.title;
            document.getElementById('menuFooter').textContent = current === 'main' ? 'A: SEL B: BCK' : 'A: OPN B: BCK';
            document.getElementById('menuItems').innerHTML = m.items.map((item, i) => 
                `<div class="menu-item ${i === selected ? 'selected' : ''}" onclick="selected=${i};handleSelect()">${item.label}</div>`
            ).join('');
        }
        
        function nav(dir) {
            const items = menus[current].items;
            if (dir === 'up') selected = (selected - 1 + items.length) % items.length;
            else if (dir === 'down') selected = (selected + 1) % items.length;
            playBlip();
            render();
        }
        
        function handleSelect() {
            const item = menus[current].items[selected];
            playSelect();
            if (item.sub) { history.push(current); current = item.sub; selected = 0; }
            else if (item.url) { playOpen(); window.open(item.url, '_blank'); }
            render();
        }
        
        function handleBack() {
            if (history.length) { playBack(); current = history.pop(); selected = 0; render(); }
        }
        
        let audioCtx;
        function tone(f, d, v=0.08) {
            try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = f;
                gain.gain.setValueAtTime(v, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
                osc.start(); osc.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }
        function playBlip() { tone(440, 0.05); }
        function playSelect() { tone(660, 0.05); setTimeout(() => tone(880, 0.05), 50); }
        function playBack() { tone(330, 0.05); }
        function playOpen() { tone(523, 0.08); setTimeout(() => tone(659, 0.08), 80); setTimeout(() => tone(784, 0.12), 160); }
        
        function toggleView() {
            const gb = document.getElementById('gameboy');
            const lv = document.getElementById('listView');
            const bt = document.querySelectorAll('.view-toggle');
            if (gb.style.display === 'none') {
                gb.style.display = 'block';
                lv.classList.remove('active');
                bt[0].textContent = 'LIST VIEW';
            } else {
                gb.style.display = 'none';
                lv.classList.add('active');
                bt[0].textContent = 'CLAW BOY';
            }
        }
        
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.onclick = (e) => { e.preventDefault(); const d = btn.dataset.dir; if(d==='up'||d==='down') nav(d); else handleBack(); };
            btn.onmousedown = () => btn.classList.add('pressed');
            btn.onmouseup = () => btn.classList.remove('pressed');
        });
        
        document.querySelectorAll('.ab-btn').forEach(btn => {
            btn.onclick = (e) => { e.preventDefault(); if(btn.dataset.action==='a') handleSelect(); else handleBack(); };
        });
        
        document.querySelector('[data-action="start"]').onclick = toggleView;
        document.querySelector('[data-action="select"]').onclick = handleSelect;
        
        document.onkeydown = (e) => {
            if (e.key === 'ArrowUp') nav('up');
            else if (e.key === 'ArrowDown') nav('down');
            else if (e.key === 'Enter' || e.key === ' ') handleSelect();
            else if (e.key === 'Backspace' || e.key === 'Escape') handleBack();
            else if (e.key === 'Tab') { e.preventDefault(); toggleView(); }
        };
        
        setTimeout(() => { document.getElementById('boot').style.display = 'none'; }, 2500);
        render();
    </script>
</body>
</html>
