<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Delano</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gray-light: #c8c8c8;
            --gray: #989898;
            --gray-dark: #686868;
            --gray-darker: #484848;
            --bezel: #4a4a5a;
            --screen-bg: #0f380f;
            --screen-green: #9bbc0f;
            --screen-dark: #0f380f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* GAME BOY BODY */
        .gameboy {
            width: 320px;
            background: linear-gradient(180deg, var(--gray-light) 0%, var(--gray) 30%, var(--gray-dark) 100%);
            border-radius: 10px 10px 50px 50px;
            padding: 18px 16px 32px;
            box-shadow: 
                0 0 0 2px var(--gray-darker),
                0 30px 60px rgba(0,0,0,0.5),
                inset 0 2px 0 rgba(255,255,255,0.3),
                inset 0 -2px 0 rgba(0,0,0,0.1);
            position: relative;
        }
        
        /* TOP HIGHLIGHT */
        .gameboy::before {
            content: '';
            position: absolute;
            top: 2px; left: 6%; right: 6%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }
        
        /* SCREEN AREA */
        .screen-container {
            background: var(--bezel);
            border-radius: 6px 6px 24px 24px;
            padding: 14px 10px 20px 14px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* BATTERY LED - left of screen, on bezel */
        .battery-led {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 4px;
            padding-left: 2px;
        }
        
        .led {
            width: 5px; height: 5px;
            background: #222;
            border-radius: 50%;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.8);
        }
        
        .led.on {
            background: #e03030;
            box-shadow: 0 0 6px #e03030, 0 0 10px rgba(224,48,48,0.4);
        }
        
        .led-label {
            font-size: 4px;
            color: #666;
            margin-left: 3px;
        }
        
        /* LABEL ABOVE SCREEN */
        .screen-label-top {
            font-size: 4px;
            color: #666;
            letter-spacing: 0.5px;
            width: 100%;
            text-align: center;
            margin-bottom: 4px;
        }
        
        /* INNER SCREEN FRAME */
        .screen-inner {
            background: #222;
            border-radius: 3px;
            padding: 3px;
        }
        
        /* LCD SCREEN */
        .screen {
            width: 144px;
            height: 128px;
            background: var(--screen-bg);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        
        /* SCREEN CONTENT */
        .screen-content {
            padding: 6px;
            color: var(--screen-green);
            font-size: 4px;
            line-height: 1.7;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .avatar-img {
            width: 16px; height: 16px;
            object-fit: cover;
            border-radius: 2px;
            margin-bottom: 3px;
        }
        
        .menu-title {
            font-size: 5px;
            border-bottom: 1px dashed var(--screen-green);
            padding-bottom: 2px;
            margin-bottom: 3px;
            width: 100%;
            text-align: center;
        }
        
        .menu-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            width: 100%;
        }
        
        .menu-item {
            padding: 1px 3px;
            width: 100%;
            text-align: center;
            opacity: 0.5;
        }
        
        .menu-item.selected {
            opacity: 1;
            background: var(--screen-green);
            color: var(--screen-dark);
        }
        
        .menu-footer {
            font-size: 3px;
            margin-top: auto;
            opacity: 0.5;
        }
        
        /* LABEL BELOW SCREEN */
        .screen-label-bottom {
            font-size: 4px;
            color: var(--gray-dark);
            letter-spacing: 0.5px;
            margin-top: 6px;
            width: 100%;
            text-align: center;
        }
        
        /* CONTROLS */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }
        
        /* D-PAD */
        .dpad {
            position: relative;
            width: 72px;
            height: 72px;
        }
        
        .dpad-btn {
            position: absolute;
            background: #282828;
            border: none;
            cursor: pointer;
            box-shadow: 0 3px 0 #111, 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .dpad-btn:active, .dpad-btn.pressed { transform: translateY(2px); box-shadow: 0 1px 0 #111; }
        
        .dpad-up { width: 22px; height: 24px; left: 50%; transform: translateX(-50%); top: 0; border-radius: 3px 3px 6px 6px; }
        .dpad-down { width: 22px; height: 24px; left: 50%; transform: translateX(-50%); bottom: 0; border-radius: 6px 6px 3px 3px; }
        .dpad-left { width: 24px; height: 22px; top: 50%; transform: translateY(-50%); left: 0; border-radius: 6px 3px 3px 6px; }
        .dpad-right { width: 24px; height: 22px; top: 50%; transform: translateY(-50%); right: 0; border-radius: 3px 6px 6px 3px; }
        
        .dpad-center {
            position: absolute;
            width: 22px; height: 22px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: #282828;
            border-radius: 50%;
        }
        
        /* A/B BUTTONS */
        .ab-container {
            display: flex;
            gap: 6px;
            transform: rotate(-12deg);
            margin-right: 2px;
        }
        
        .ab-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 8px;
            color: rgba(255,255,255,0.8);
            box-shadow: 0 3px 0 #400828, 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .ab-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #400828; }
        
        .btn-a { background: #a01050; }
        .btn-b { background: #a01050; margin-top: 6px; }
        
        /* START/SELECT */
        .meta-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
            transform: rotate(-18deg);
        }
        
        .meta-btn {
            width: 26px; height: 7px;
            background: #383838;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 0 #181818;
        }
        
        .meta-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #181818; }
        
        .meta-label {
            font-size: 4px;
            color: var(--gray-dark);
            text-align: center;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        
        /* BRANDING */
        .branding {
            text-align: center;
            margin-top: 10px;
        }
        
        .brand-text {
            font-size: 6px;
            color: var(--gray-dark);
            letter-spacing: 1px;
        }
        
        .brand-text span { color: #4848a0; }
        
        /* VIEW TOGGLE */
        .view-toggle {
            margin-top: 50px;
            background: var(--gray-dark);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 5px;
            cursor: pointer;
        }
        
        /* LIST VIEW */
        .list-view {
            display: none;
            width: 100%;
            max-width: 360px;
        }
        
        .list-view.active { display: block; }
        
        .list-section { margin-bottom: 12px; }
        
        .list-title {
            color: #888;
            font-size: 6px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .list-link {
            display: block;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 5px;
            padding: 8px 10px;
            color: #fff;
            text-decoration: none;
            font-size: 8px;
            margin-bottom: 4px;
        }
        
        .list-link:hover {
            background: rgba(233,69,96,0.2);
            border-color: #e94560;
        }
        
        /* BOOT */
        .boot {
            position: fixed;
            inset: 0;
            background: var(--screen-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: bootFade 2.5s ease-out forwards;
        }
        
        @keyframes bootFade {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }
        
        .boot-text {
            color: var(--screen-green);
            font-size: 5px;
            text-align: center;
            line-height: 2;
        }
        
        @media (max-width: 350px) {
            .gameboy { width: 95%; }
            .screen { width: 120px; height: 108px; }
        }
        
        button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <!-- BOOT -->
    <div class="boot" id="boot">
        <div class="boot-text">FLUME<br>EST. 2026<br><br>TYLER DELANO</div>
    </div>
    
    <div class="container">
        <!-- GAME BOY -->
        <div class="gameboy" id="gameboy">
            <!-- Screen -->
            <div class="screen-container">
                <!-- Battery LED -->
                <div class="battery-led">
                    <div class="led on"></div>
                    <span class="led-label">BATTERY</span>
                </div>
                
                <!-- Label above -->
                <div class="screen-label-top">DOT MATRIX WITH STEREO SOUND</div>
                
                <!-- Screen -->
                <div class="screen-inner">
                    <div class="screen" onclick="handleSelect()">
                        <div class="screen-content">
                            <img src="avatar.jpg" alt="Tyler" class="avatar-img">
                            <div class="menu-title" id="menuTitle">MENU</div>
                            <div class="menu-items" id="menuItems"></div>
                            <div class="menu-footer" id="menuFooter">A: SELECT B: BACK</div>
                        </div>
                    </div>
                </div>
                
                <!-- Label below -->
                <div class="screen-label-bottom">Nintendo <span>CLAW BOY</span></div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <div class="dpad">
                    <button class="dpad-btn dpad-up" data-dir="up"></button>
                    <button class="dpad-btn dpad-down" data-dir="down"></button>
                    <button class="dpad-btn dpad-left" data-dir="left"></button>
                    <button class="dpad-btn dpad-right" data-dir="right"></button>
                    <div class="dpad-center"></div>
                </div>
                
                <div class="ab-container">
                    <button class="ab-btn btn-b" data-action="b">B</button>
                    <button class="ab-btn btn-a" data-action="a">A</button>
                </div>
            </div>
            
            <!-- Start/Select -->
            <div class="meta-container">
                <div>
                    <button class="meta-btn" data-action="select"></button>
                    <div class="meta-label">SELECT</div>
                </div>
                <div>
                    <button class="meta-btn" data-action="start" id="startBtn"></button>
                    <div class="meta-label">START</div>
                </div>
            </div>
            
            <!-- Branding -->
            <div class="branding">
                <div class="brand-text"><span>CLAW BOY</span></div>
            </div>
        </div>
        
        <!-- Toggle -->
        <button class="view-toggle" onclick="toggleView()">LIST VIEW</button>
        
        <!-- List View -->
        <div class="list-view" id="listView">
            <div class="list-section">
                <div class="list-title">Projects</div>
                <a href="https://flume.sh" class="list-link" target="_blank">Flume.sh</a>
                <a href="https://tylerdotai.github.io/personal-site" class="list-link" target="_blank">Terminal Portfolio</a>
                <a href="https://github.com/tylerdotai/proof" class="list-link" target="_blank">Proof</a>
            </div>
            <div class="list-section">
                <div class="list-title">Community</div>
                <a href="https://www.clawplex.dev" class="list-link" target="_blank">Clawplex</a>
                <a href="https://discord.gg/q8kEquTu3z" class="list-link" target="_blank">Discord</a>
            </div>
            <div class="list-section">
                <div class="list-title">Contact</div>
                <a href="mailto:tyler.delano@icloud.com" class="list-link">Email</a>
            </div>
            <div class="list-section">
                <div class="list-title">Social</div>
                <a href="https://linkedin.com/in/tylerpdelano" class="list-link" target="_blank">LinkedIn</a>
                <a href="https://twitter.com/tylerdotai" class="list-link" target="_blank">Twitter</a>
                <a href="https://github.com/tylerdotai" class="list-link" target="_blank">GitHub</a>
            </div>
            <button class="view-toggle" onclick="toggleView()">CLAW BOY</button>
        </div>
    </div>
    
    <script>
        // MENU DATA
        const menus = {
            main: { title: 'MENU', items: [
                { label: 'Projects', sub: 'projects' },
                { label: 'Community', sub: 'community' },
                { label: 'Contact', sub: 'contact' },
                { label: 'Social', sub: 'social' }
            ]},
            projects: { title: 'PROJECTS', items: [
                { label: 'Flume.sh', url: 'https://flume.sh' },
                { label: 'Terminal', url: 'https://tylerdotai.github.io/personal-site' },
                { label: 'Proof', url: 'https://github.com/tylerdotai/proof' }
            ]},
            community: { title: 'COMMUNITY', items: [
                { label: 'Clawplex', url: 'https://www.clawplex.dev' },
                { label: 'Discord', url: 'https://discord.gg/q8kEquTu3z' }
            ]},
            contact: { title: 'CONTACT', items: [
                { label: 'Email', url: 'mailto:tyler.delano@icloud.com' }
            ]},
            social: { title: 'SOCIAL', items: [
                { label: 'LinkedIn', url: 'https://linkedin.com/in/tylerpdelano' },
                { label: 'Twitter', url: 'https://twitter.com/tylerdotai' },
                { label: 'GitHub', url: 'https://github.com/tylerdotai' }
            ]}
        };
        
        // STATE
        let current = 'main', selected = 0, history = [];
        
        // DOM
        const menuTitle = document.getElementById('menuTitle');
        const menuItems = document.getElementById('menuItems');
        const menuFooter = document.getElementById('menuFooter');
        
        // RENDER
        function render() {
            const m = menus[current];
            menuTitle.textContent = m.title;
            menuFooter.textContent = current === 'main' ? 'A: SELECT B: BACK' : 'A: OPEN B: BACK';
            menuItems.innerHTML = m.items.map((item, i) => 
                `<div class="menu-item ${i === selected ? 'selected' : ''}" onclick="selected=${i};handleSelect()">${item.label}</div>`
            ).join('');
        }
        
        // ACTIONS
        function nav(dir) {
            const items = menus[current].items;
            if (dir === 'up') selected = (selected - 1 + items.length) % items.length;
            else if (dir === 'down') selected = (selected + 1) % items.length;
            playBlip();
            render();
        }
        
        function handleSelect() {
            const item = menus[current].items[selected];
            playSelect();
            if (item.sub) { history.push(current); current = item.sub; selected = 0; }
            else if (item.url) { playOpen(); window.open(item.url, '_blank'); }
            render();
        }
        
        function handleBack() {
            if (history.length) { playBack(); current = history.pop(); selected = 0; render(); }
        }
        
        // SOUND
        let audioCtx, soundOn = true;
        function init() { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        function tone(f, d, v=0.08) {
            if (!soundOn || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = f;
                gain.gain.setValueAtTime(v, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
                osc.start(); osc.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }
        function playBlip() { tone(440, 0.05); }
        function playSelect() { tone(660, 0.05); setTimeout(() => tone(880, 0.05), 50); }
        function playBack() { tone(330, 0.05); }
        function playOpen() { tone(523, 0.08); setTimeout(() => tone(659, 0.08), 80); setTimeout(() => tone(784, 0.12), 160); }
        
        // TOGGLE
        function toggleView() {
            const gb = document.getElementById('gameboy');
            const lv = document.getElementById('listView');
            const bt = document.querySelectorAll('.view-toggle');
            if (gb.style.display === 'none') {
                gb.style.display = 'block';
                lv.classList.remove('active');
                bt[0].textContent = 'LIST VIEW';
            } else {
                gb.style.display = 'none';
                lv.classList.add('active');
                bt[0].textContent = 'CLAW BOY';
            }
        }
        
        // EVENTS
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.onclick = (e) => { e.preventDefault(); const d = btn.dataset.dir; if(d==='up'||d==='down') nav(d); else handleBack(); };
            btn.onmousedown = () => btn.classList.add('pressed');
            btn.onmouseup = () => btn.classList.remove('pressed');
        });
        document.querySelectorAll('.ab-btn').forEach(btn => {
            btn.onclick = (e) => { e.preventDefault(); if(btn.dataset.action==='a') handleSelect(); else handleBack(); };
        });
        document.querySelector('[data-action="start"]').onclick = toggleView;
        document.querySelector('[data-action="select"]').onclick = handleSelect;
        document.onkeydown = (e) => {
            if (e.key === 'ArrowUp') nav('up');
            else if (e.key === 'ArrowDown') nav('down');
            else if (e.key === 'Enter' || e.key === ' ') handleSelect();
            else if (e.key === 'Backspace' || e.key === 'Escape') handleBack();
            else if (e.key === 'Tab') { e.preventDefault(); toggleView(); }
        };
        
        // INIT
        setTimeout(() => { document.getElementById('boot').style.display = 'none'; }, 2500);
        render();
    </script>
</body>
</html>
