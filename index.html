<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Delano | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* === PHASE 3: POLISH - Color Variables === */
            --device-purple: #1a1625;
            --device-purple-light: #2d2640;
            --device-purple-dark: #0f0d14;
            --device-purple-highlight: #3d3655;
            
            --screen-bg: #0d1a0d;
            --screen-green: #9bbc0f;
            --screen-green-dark: #0f380f;
            --screen-green-light: #8bac0f;
            --screen-glow: rgba(155, 188, 15, 0.15);
            
            --button-a: #e94560;
            --button-a-dark: #b8344d;
            --button-b: #e94560;
            --button-b-dark: #b8344d;
            
            --dpad: #15101d;
            --dpad-light: #1f1a2d;
            --dpad-dark: #0a0810;
            
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #09090b;
            background-image: 
                radial-gradient(ellipse at center, rgba(233, 69, 96, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at bottom, rgba(45, 38, 64, 0.3) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* === PHASE 1: DEVICE SHELL === */
        .device {
            width: 320px;
            background: linear-gradient(180deg, var(--device-purple-light) 0%, var(--device-purple) 50%, var(--device-purple-dark) 100%);
            border-radius: 24px 24px 70px 70px;
            padding: 20px;
            /* === PHASE 3: Enhanced shadows === */
            box-shadow: 
                0 0 0 2px var(--device-purple-dark),
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 15px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -1px 0 rgba(0,0,0,0.3);
            position: relative;
        }

        /* === PHASE 3: Top edge highlight === */
        .device::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        /* Screen bezel */
        .screen-bezel {
            background: linear-gradient(145deg, #0d0a14, #08060d);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 24px;
            /* === PHASE 3: Deep bezel shadow === */
            box-shadow: 
                inset 0 3px 12px rgba(0,0,0,0.8),
                inset 0 1px 0 rgba(255,255,255,0.05),
                0 1px 0 rgba(255,255,255,0.05);
            position: relative;
        }

        /* Screen inner frame */
        .screen-frame {
            background: #050408;
            border-radius: 8px;
            padding: 4px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Screen area */
        .screen {
            background: var(--screen-bg);
            border-radius: 6px;
            height: 200px;
            position: relative;
            overflow: hidden;
            /* === PHASE 3: Inner glow === */
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.6),
                inset 0 0 15px rgba(0,0,0,0.4),
                0 0 10px var(--screen-glow);
        }

        /* === PHASE 3: Animated scanlines === */
        .screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* === PHASE 3: Screen flicker === */
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top, rgba(155,188,15,0.03) 0%, transparent 50%);
            pointer-events: none;
            animation: flicker 0.15s infinite;
            opacity: 0.5;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.52; }
        }

        /* Screen content */
        .screen-content {
            padding: 16px;
            color: var(--screen-green);
            font-size: 12px;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .screen-header {
            text-align: center;
            border-bottom: 2px solid var(--screen-green-dark);
            padding-bottom: 8px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            /* === PHASE 3: Glow effect === */
            text-shadow: 0 0 8px var(--screen-green);
        }

        /* === PHASE 3: Battery indicator === */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 9px;
            color: var(--screen-green-dark);
        }

        .battery {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .battery-icon {
            width: 20px;
            height: 10px;
            border: 1px solid var(--screen-green-dark);
            border-radius: 2px;
            padding: 1px;
        }

        .battery-level {
            height: 100%;
            width: 80%;
            background: var(--screen-green);
            border-radius: 1px;
        }

        .menu-item {
            padding: 6px 8px;
            border-radius: 4px;
            opacity: 0.5;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .menu-item.selected {
            opacity: 1;
            background: var(--screen-green-dark);
            /* === PHASE 3: Selection glow === */
            box-shadow: 
                0 0 10px var(--screen-glow),
                inset 0 0 10px rgba(155,188,15,0.1);
            color: var(--screen-green-light);
            font-weight: 600;
        }

        .menu-item::before {
            content: '>';
            position: absolute;
            left: -4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .menu-item.selected::before {
            opacity: 1;
            text-shadow: 0 0 5px var(--screen-green);
        }

        /* === PHASE 2: BUTTON LAYOUT === */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 14px;
        }

        /* === PHASE 3: D-Pad with depth === */
        .dpad {
            position: relative;
            width: 95px;
            height: 95px;
        }

        .dpad-btn {
            position: absolute;
            background: linear-gradient(145deg, var(--dpad-light), var(--dpad));
            border: none;
            cursor: pointer;
            transition: all 0.1s;
            /* === PHASE 3: 3D button depth === */
            box-shadow: 
                0 4px 0 var(--dpad-dark),
                0 6px 10px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .dpad-btn:active, .dpad-btn.pressed {
            transform: translateY(2px);
            box-shadow: 
                0 2px 0 var(--dpad-dark),
                0 3px 5px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        /* D-pad shapes */
        .dpad-up, .dpad-down {
            width: 30px;
            height: 34px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 6px 6px 10px 10px;
        }

        .dpad-up { 
            top: 0; 
            border-radius: 8px 8px 12px 12px;
        }
        .dpad-down { 
            bottom: 0; 
            border-radius: 12px 12px 8px 8px;
        }

        .dpad-left, .dpad-right {
            width: 34px;
            height: 30px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 10px 10px 10px 10px;
        }

        .dpad-left { 
            left: 0; 
            border-radius: 12px 6px 6px 12px;
        }
        .dpad-right { 
            right: 0; 
            border-radius: 6px 12px 12px 6px;
        }

        .dpad-center {
            position: absolute;
            width: 30px;
            height: 30px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, var(--dpad), var(--dpad-dark));
            border-radius: 50%;
            /* === PHASE 3: Center indent === */
            box-shadow: 
                inset 0 2px 4px rgba(0,0,0,0.5),
                0 1px 0 rgba(255,255,255,0.03);
        }

        /* === PHASE 3: AB Buttons with depth === */
        .ab-buttons {
            display: flex;
            gap: 14px;
            transform: rotate(-12deg);
            margin-right: 14px;
        }

        .ab-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            /* === PHASE 3: 3D button effect === */
            box-shadow: 
                0 6px 0 var(--button-a-dark),
                0 8px 15px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.1s;
            position: relative;
        }

        .ab-btn:active {
            transform: translateY(4px);
            box-shadow: 
                0 2px 0 var(--button-a-dark),
                0 3px 5px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn-a { 
            background: linear-gradient(145deg, #f05070, var(--button-a));
            margin-top: 10px;
        }
        
        .btn-b { 
            background: linear-gradient(145deg, #f05070, var(--button-b));
        }

        /* Button labels */
        .ab-btn::after {
            content: attr(data-label);
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }

        /* === PHASE 2: Start/Select === */
        .meta-buttons {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 24px;
        }

        .meta-btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .meta-btn {
            width: 44px;
            height: 10px;
            background: linear-gradient(180deg, #1a1525, #15101d);
            border-radius: 10px;
            border: none;
            cursor: pointer;
            /* === PHASE 3: Meta button depth === */
            box-shadow: 
                0 2px 0 var(--dpad-dark),
                0 3px 6px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .meta-btn:active {
            transform: translateY(1px);
            box-shadow: 
                0 1px 0 var(--dpad-dark),
                0 2px 3px rgba(0,0,0,0.3);
        }

        .meta-btn-label {
            text-align: center;
            font-size: 8px;
            color: #555;
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* === PHASE 1: Speaker grille === */
        .speaker {
            position: absolute;
            right: 24px;
            bottom: 90px;
            display: grid;
            grid-template-columns: repeat(6, 5px);
            gap: 5px;
            /* === PHASE 3: Speaker depth === */
            transform: rotate(-30deg);
        }

        .speaker-dot {
            width: 5px;
            height: 5px;
            background: radial-gradient(circle at 30% 30%, #15101d, #08060d);
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }

        /* === PHASE 3: Power LED === */
        .power-led {
            position: absolute;
            left: 30px;
            top: 50%;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .led {
            width: 6px;
            height: 6px;
            background: #2d5a2d;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }

        .led.on {
            background: #4a8a4a;
            box-shadow: 
                0 0 8px #4a8a4a,
                0 0 15px rgba(74, 138, 74, 0.5);
            animation: led-pulse 2s ease-in-out infinite;
        }

        @keyframes led-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .led-label {
            font-size: 7px;
            color: #444;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .device {
                width: 100%;
                max-width: 300px;
                padding: 16px;
            }
            
            .dpad { width: 80px; height: 80px; }
            .ab-btn { width: 38px; height: 38px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="device">
        <!-- Power LED -->
        <div class="power-led">
            <div class="led on"></div>
            <span class="led-label">POWER</span>
        </div>

        <!-- PHASE 1: Screen -->
        <div class="screen-bezel">
            <div class="screen-frame">
                <div class="screen">
                    <div class="screen-content">
                        <div class="status-bar">
                            <span>TYLER</span>
                            <div class="battery">
                                <div class="battery-icon">
                                    <div class="battery-level"></div>
                                </div>
                            </div>
                        </div>
                        <div class="screen-header">MENU</div>
                        <div class="menu-item selected">Projects</div>
                        <div class="menu-item">Community</div>
                        <div class="menu-item">Contact</div>
                        <div class="menu-item">Social</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PHASE 2: D-Pad -->
        <div class="controls">
            <div class="dpad">
                <button class="dpad-btn dpad-up" data-dir="up" aria-label="Up"></button>
                <button class="dpad-btn dpad-down" data-dir="down" aria-label="Down"></button>
                <button class="dpad-btn dpad-left" data-dir="left" aria-label="Left"></button>
                <button class="dpad-btn dpad-right" data-dir="right" aria-label="Right"></button>
                <div class="dpad-center"></div>
            </div>

            <div class="ab-buttons">
                <button class="ab-btn btn-b" data-action="b" data-label="B">B</button>
                <button class="ab-btn btn-a" data-action="a" data-label="A">A</button>
            </div>
        </div>

        <div class="meta-buttons">
            <div class="meta-btn-container">
                <button class="meta-btn" data-action="select"></button>
                <div class="meta-btn-label">SELECT</div>
            </div>
            <div class="meta-btn-container">
                <button class="meta-btn" data-action="start"></button>
                <div class="meta-btn-label">START</div>
            </div>
        </div>

        <div class="speaker">
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
        </div>
    </div>

    <script>
        // === PHASE 5: D-PAD NAVIGATION ===
        const menuItems = document.querySelectorAll('.menu-item');
        let selectedIndex = 0;

        function updateSelection() {
            menuItems.forEach((item, i) => {
                item.classList.toggle('selected', i === selectedIndex);
            });
        }

        // D-pad navigation
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const dir = btn.dataset.dir;
                if (dir === 'up') {
                    selectedIndex = (selectedIndex - 1 + menuItems.length) % menuItems.length;
                } else if (dir === 'down') {
                    selectedIndex = (selectedIndex + 1) % menuItems.length;
                } else if (dir === 'left' || dir === 'right') {
                    // Could navigate between menus
                }
                updateSelection();
            });
            
            // Visual press effect
            btn.addEventListener('mousedown', () => btn.classList.add('pressed'));
            btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('pressed'));
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                selectedIndex = (selectedIndex - 1 + menuItems.length) % menuItems.length;
                updateSelection();
            } else if (e.key === 'ArrowDown') {
                selectedIndex = (selectedIndex + 1) % menuItems.length;
                updateSelection();
            }
        });

        // === TDD TESTS ===
        const tests = [];
        
        function test(name, fn) {
            try {
                fn();
                tests.push({ name, status: 'PASS' });
            } catch (e) {
                tests.push({ name, status: 'FAIL', error: e.message });
            }
        }

        function assert(condition, message) {
            if (!condition) throw new Error(message);
        }

        // Run tests
        test('Device has enhanced shadows', () => {
            assert(document.querySelector('.device').style.boxShadow !== '', 'No shadow');
        });

        test('Screen has glow effect', () => {
            const screen = document.querySelector('.screen');
            const style = screen.style.boxShadow || getComputedStyle(screen).boxShadow;
            assert(style.includes('rgb'), 'No glow');
        });

        test('Scanlines animation exists', () => {
            assert(document.querySelector('.screen::after') !== null || 
                   getComputedStyle(document.querySelector('.screen'), ':after').background !== '', 'No scanlines');
        });

        test('LED has pulse animation', () => {
            const led = document.querySelector('.led.on');
            assert(led !== null, 'LED not on');
        });

        test('Battery indicator exists', () => {
            assert(document.querySelector('.battery') !== null, 'No battery');
        });

        test('Status bar exists', () => {
            assert(document.querySelector('.status-bar') !== null, 'No status bar');
        });

        test('Buttons have 3D depth', () => {
            const abBtn = document.querySelector('.ab-btn');
            const style = abBtn.style.boxShadow || getComputedStyle(abBtn).boxShadow;
            assert(style.includes('0 6px'), 'No 3D depth');
        });

        test('Device has highlight edge', () => {
            assert(document.querySelector('.device::before') !== null, 'No highlight');
        });

        test('Speaker has depth', () => {
            const speaker = document.querySelector('.speaker');
            assert(speaker.style.transform !== '', 'No rotation');
        });

        test('Meta buttons exist with labels', () => {
            assert(document.querySelectorAll('.meta-btn').length === 2, 'Wrong count');
            assert(document.querySelectorAll('.meta-btn-label').length === 2, 'No labels');
        });

        // Output results
        console.log('=== PHASE 3 TDD TESTS ===');
        tests.forEach(t => {
            console.log(`${t.status}: ${t.name}`);
            if (t.error) console.log(`  Error: ${t.error}`);
        });
        console.log(`\nTOTAL: ${tests.filter(t => t.status === 'PASS').length} passed, ${tests.filter(t => t.status === 'FAIL').length} failed`);
    </script>
</body>
</html>
