<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tylerdotai | Flume ClawBoy</title>
    <meta name="description" content="Interactive retro handheld linktree">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14/dist/gsap.min.js"></script>
    
    <style>
        /* === CUSTOM CSS === */
        :root {
            --body-gray: #9c9c9c;
            --body-dark: #5c5c5c;
            --screen-bg: #0f380f;
            --screen-green: #9bbc0f;
            --btn-a: #32cd32;
            --btn-b: #ff3030;
            --dpad: #2d2d2d;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background: linear-gradient(180deg, #09090b 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow-x hidden;
        }
        
        /* === BOOT SEQUENCE === */
        .boot-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .boot-screen.hidden { display: none; }
        
        /* CRT Effect */
        .crt-overlay {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 2px,
                rgba(0,0,0,0.15) 2px,
                rgba(0,0,0,0.15) 4px
            );
            pointer-events: none;
            animation: crt-scroll 0.1s linear infinite;
        }
        
        @keyframes crt-scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }
        
        /* Static noise */
        .noise {
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        
        .boot-logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(180deg, #ff6b00 0%, #ff3030 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255,107,0,0.5);
        }
        
        .boot-powered {
            font-size: 0.6rem;
            color: var(--screen-green);
            margin-top: 1rem;
            opacity: 0;
        }
        
        .press-start {
            position: absolute;
            bottom: 3rem;
            font-size: 0.5rem;
            color: #666;
            cursor: pointer;
            animation: blink 1s steps(2) infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Power LED */
        .power-led {
            width: 6px;
            height: 6px;
            background: #1a1a1a;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }
        
        .power-led.on {
            background: #ff2020;
            box-shadow: 0 0 8px #ff2020, 0 0 15px rgba(255,32,32,0.6);
            animation: led-pulse 1s ease-in-out infinite;
        }
        
        @keyframes led-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        /* === DEVICE === */
        .device-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            opacity: 0;
        }
        
        .device-container.visible { opacity: 1; }
        
        .device {
            width: 280px;
            background: linear-gradient(180deg, #b0b0b0 0%, var(--body-gray) 30%, var(--body-dark) 100%);
            border-radius: 12px 12px 50px 50px;
            padding: 18px 16px 30px;
            box-shadow: 
                0 0 0 2px #484848,
                0 30px 60px rgba(0,0,0,0.6),
                inset 0 2px 0 rgba(255,255,255,0.3),
                inset 0 -2px 0 rgba(0,0,0,0.15);
            position: relative;
            transform: scale(0.8);
            opacity: 0;
        }
        
        .device.revealed {
            transform: scale(1);
            opacity: 1;
        }
        
        /* Screen Housing */
        .screen-housing {
            background: #3a3a48;
            border-radius: 8px 8px 28px 28px;
            padding: 14px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Battery LED on bezel */
        .battery-led-section {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            align-self: flex-start;
            margin-left: 4px;
        }
        
        .battery-label {
            font-size: 0.4rem;
            color: #555;
        }
        
        /* Screen */
        .screen-bezel {
            background: #1a1a1a;
            border-radius: 4px;
            padding: 4px;
        }
        
        .screen {
            width: 160px;
            height: 144px;
            background: var(--screen-bg);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        
        /* Pixel Grid */
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 2px 2px;
            pointer-events: none;
            z-index: 5;
        }
        
        /* Scanlines */
        .screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                transparent 1px,
                rgba(0,0,0,0.08) 1px,
                rgba(0,0,0,0.08) 2px
            );
            pointer-events: none;
            z-index: 6;
        }
        
        /* Screen Content */
        .screen-content {
            padding: 10px;
            color: var(--screen-green);
            font-size: 0.45rem;
            line-height: 1.6;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .screen-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px dashed var(--screen-green);
        }
        
        .screen-avatar {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            object-fit: cover;
        }
        
        .screen-status {
            font-size: 0.35rem;
            color: #6b8b6b;
            margin-bottom: 8px;
        }
        
        .screen-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .menu-item {
            padding: 3px 6px;
            opacity: 0.5;
            cursor: pointer;
            transition: all 0.1s;
            border-radius: 2px;
        }
        
        .menu-item:hover, .menu-item.selected {
            opacity: 1;
            background: var(--screen-green);
            color: var(--screen-bg);
        }
        
        .menu-item::before { content: '> '; opacity: 0; }
        .menu-item.selected::before { opacity: 1; }
        
        .screen-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 4px;
            border-top: 1px dashed var(--screen-green);
        }
        
        .battery-bar {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.3rem;
        }
        
        .battery-icon {
            width: 12px;
            height: 6px;
            border: 1px solid var(--screen-green);
            padding: 1px;
            border-radius: 1px;
        }
        
        .battery-fill {
            height: 100%;
            width: 80%;
            background: var(--screen-green);
            border-radius: 1px;
        }
        
        .high-score {
            font-size: 0.3rem;
        }
        
        /* D-PAD */
        .controls {
            display: flex;
            justify-content: space-between;
            padding: 0 4px;
        }
        
        .dpad {
            position: relative;
            width: 70px;
            height: 70px;
        }
        
        .dpad-btn {
            position: absolute;
            background: var(--dpad);
            border: none;
            cursor: pointer;
            box-shadow: 0 3px 0 #151515, 0 4px 6px rgba(0,0,0,0.4);
        }
        
        .dpad-btn:active, .dpad-btn.pressed {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #151515;
        }
        
        .dpad-up { width: 22px; height: 24px; left: 50%; transform: translateX(-50%); top: 0; border-radius: 4px 4px 8px 8px; }
        .dpad-down { width: 22px; height: 24px; left: 50%; transform: translateX(-50%); bottom: 0; border-radius: 8px 8px 4px 4px; }
        .dpad-left { width: 24px; height: 22px; top: 50%; transform: translateY(-50%); left: 0; border-radius: 8px 4px 4px 8px; }
        .dpad-right { width: 24px; height: 22px; top: 50%; transform: translateY(-50%); right: 0; border-radius: 4px 8px 8px 4px; }
        
        .dpad-center {
            position: absolute;
            width: 22px;
            height: 22px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--dpad);
            border-radius: 50%;
        }
        
        /* A/B Buttons */
        .ab-btns {
            display: flex;
            gap: 8px;
            transform: rotate(-15deg);
            margin-right: 4px;
        }
        
        .ab-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.5rem;
            color: rgba(255,255,255,0.9);
            box-shadow: 0 3px 0 #1a1a1a, 0 4px 6px rgba(0,0,0,0.4);
        }
        
        .ab-btn:active, .ab-btn.pressed {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a1a1a;
        }
        
        .btn-a { background: var(--btn-a); margin-top: 6px; }
        .btn-b { background: var(--btn-b); }
        
        /* Start/Select */
        .meta-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
            transform: rotate(-20deg);
        }
        
        .meta-btn {
            width: 28px;
            height: 7px;
            background: #3a3a3a;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 0 #1a1a1a;
        }
        
        .meta-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 #1a1a1a; }
        
        .meta-label {
            font-size: 0.35rem;
            color: var(--body-dark);
            text-align: center;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        
        /* Branding */
        .branding {
            text-align: center;
            margin-top: 10px;
        }
        
        .brand-text {
            font-size: 0.55rem;
            color: var(--body-dark);
            letter-spacing: 1px;
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            .boot-screen { display: none; }
            .device-container { opacity: 1; }
            .device { transform: scale(1); opacity: 1; }
        }
        
        /* Mobile */
        @media (max-width: 360px) {
            .device { width: 85vw; max-width: 260px; transform: scale(0.9); }
            .device.revealed { transform: scale(0.9); }
            .screen { width: 130px; height: 116px; }
            .screen-content { padding: 6px; font-size: 0.4rem; }
            .dpad { width: 55px; height: 55px; }
            .ab-btn { width: 26px; height: 26px; font-size: 0.4rem; }
        }
        
        button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <!-- BOOT SEQUENCE -->
    <div class="boot-screen" id="bootScreen">
        <div class="crt-overlay"></div>
        <div class="noise"></div>
        <div class="boot-logo" id="bootLogo">FLUME</div>
        <div class="boot-powered" id="bootPowered">POWERED BY HOSS</div>
        <div class="press-start" id="pressStart">PRESS START TO SKIP >></div>
    </div>
    
    <!-- DEVICE -->
    <div class="device-container" id="deviceContainer">
        <div class="device" id="device">
            <!-- Screen Housing -->
            <div class="screen-housing">
                <!-- Battery LED -->
                <div class="battery-led-section">
                    <div class="power-led on"></div>
                    <span class="battery-label">BATTERY</span>
                </div>
                
                <!-- Screen -->
                <div class="screen-bezel">
                    <div class="screen" id="screen" onclick="handleSelect()">
                        <div class="screen-content">
                            <!-- Header -->
                            <div class="screen-header">
                                <img src="avatar.jpg" alt="Tyler" class="screen-avatar" id="avatar">
                                <span>PLAYER: tylerdotai</span>
                            </div>
                            
                            <!-- Status -->
                            <div class="screen-status">AI tinkerer & link hoarder</div>
                            
                            <!-- Menu -->
                            <div class="screen-menu" id="menuItems">
                                <div class="menu-item selected" data-index="0">> SOCIAL</div>
                                <div class="menu-item" data-index="1">> PROJECTS</div>
                                <div class="menu-item" data-index="2">> CONTACT</div>
                            </div>
                            
                            <!-- Footer -->
                            <div class="screen-footer">
                                <div class="battery-bar">
                                    <div class="battery-icon"><div class="battery-fill"></div></div>
                                    <span>100%</span>
                                </div>
                                <div class="high-score">HIGH: ∞</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <div class="dpad">
                    <button class="dpad-btn dpad-up" data-dir="up"></button>
                    <button class="dpad-btn dpad-down" data-dir="down"></button>
                    <button class="dpad-btn dpad-left" data-dir="left"></button>
                    <button class="dpad-btn dpad-right" data-dir="right"></button>
                    <div class="dpad-center"></div>
                </div>
                
                <div class="ab-btns">
                    <button class="ab-btn btn-b" data-action="b">B</button>
                    <button class="ab-btn btn-a" data-action="a">A</button>
                </div>
            </div>
            
            <!-- Start/Select -->
            <div class="meta-btns">
                <div>
                    <button class="meta-btn" data-action="select"></button>
                    <div class="meta-label">SELECT</div>
                </div>
                <div>
                    <button class="meta-btn" data-action="start"></button>
                    <div class="meta-label">START</div>
                </div>
            </div>
            
            <!-- Branding -->
            <div class="branding">
                <div class="brand-text">CLAW BOY</div>
            </div>
        </div>
    </div>

    <script>
        // === STATE ===
        const state = {
            currentMenu: 'main',
            selectedIndex: 0,
            history: [],
            menuData: {
                main: [
                    { label: 'SOCIAL', submenu: 'social' },
                    { label: 'PROJECTS', submenu: 'projects' },
                    { label: 'CONTACT', submenu: 'contact' }
                ],
                social: [
                    { label: '@tylerdotai (X)', url: 'https://twitter.com/tylerdotai' },
                    { label: 'GitHub', url: 'https://github.com/tylerdotai' },
                    { label: 'LinkedIn', url: 'https://linkedin.com/in/tylerpdelano' },
                    { label: '< BACK', submenu: 'main' }
                ],
                projects: [
                    { label: 'Flume.sh', url: 'https://flume.sh' },
                    { label: 'Terminal Portfolio', url: 'https://tylerdotai.github.io/personal-site' },
                    { label: 'Proof', url: 'https://github.com/tylerdotai/proof' },
                    { label: '< BACK', submenu: 'main' }
                ],
                contact: [
                    { label: 'Email', url: 'mailto:tyler.delano@icloud.com' },
                    { label: 'Clawplex', url: 'https://www.clawplex.dev' },
                    { label: 'Discord', url: 'https://discord.gg/q8kEquTu3z' },
                    { label: '< BACK', submenu: 'main' }
                ]
            }
        };
        
        // === BOOT SEQUENCE ===
        const bootScreen = document.getElementById('bootScreen');
        const bootLogo = document.getElementById('bootLogo');
        const bootPowered = document.getElementById('bootPowered');
        const pressStart = document.getElementById('pressStart');
        
        function runBootSequence() {
            const tl = gsap.timeline({
                onComplete: () => {
                    setTimeout(() => {
                        bootScreen.classList.add('hidden');
                        revealDevice();
                    }, 500);
                }
            });
            
            // Logo fade in
            tl.fromTo(bootLogo, 
                { opacity: 0, scale: 0.8, filter: 'blur(10px)' },
                { opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.8, ease: 'power2.out' }
            );
            
            // Powered text
            tl.to(bootPowered, { opacity: 1, duration: 0.3 }, '-=0.2');
            
            // Blink effect on logo
            tl.to(bootLogo, { 
                textShadow: '0 0 30px rgba(255,107,0,0.8), 0 0 60px rgba(255,107,0,0.4)',
                duration: 0.1,
                repeat: 3,
                yoyo: true
            });
            
            // Press start blink
            tl.to(pressStart, { opacity: 1, duration: 0.3 });
            
            // Total: ~2.5 seconds
        }
        
        // Skip boot
        pressStart.addEventListener('click', () => {
            gsap.to(bootScreen, { opacity: 0, duration: 0.3, onComplete: () => {
                bootScreen.classList.add('hidden');
                revealDevice();
            }});
        });
        
        // === DEVICE REVEAL ===
        function revealDevice() {
            const container = document.getElementById('deviceContainer');
            const device = document.getElementById('device');
            
            container.classList.add('visible');
            
            gsap.to(device, {
                scale: 1,
                opacity: 1,
                duration: 1.2,
                ease: 'power3.out'
            });
        }
        
        // === MENU RENDERING ===
        function renderMenu() {
            const items = state.menuData[state.currentMenu];
            const menuEl = document.getElementById('menuItems');
            
            menuEl.innerHTML = items.map((item, i) => 
                `<div class="menu-item ${i === state.selectedIndex ? 'selected' : ''}" 
                      data-index="${i}"
                      onclick="selectItem(${i})">
                    ${item.label}
                 </div>`
            ).join('');
        }
        
        function selectItem(index) {
            state.selectedIndex = index;
            handleSelect();
        }
        
        // === ACTIONS ===
        function navigate(dir) {
            const items = state.menuData[state.currentMenu];
            if (dir === 'up') {
                state.selectedIndex = (state.selectedIndex - 1 + items.length) % items.length;
            } else if (dir === 'down') {
                state.selectedIndex = (state.selectedIndex + 1) % items.length;
            }
            playBlip();
            renderMenu();
        }
        
        function handleSelect() {
            const items = state.menuData[state.currentMenu];
            const item = items[state.selectedIndex];
            
            playSelect();
            
            // Screen flash effect
            const screen = document.getElementById('screen');
            gsap.to(screen, { 
                backgroundColor: '#fff', 
                duration: 0.05, 
                onComplete: () => {
                    gsap.to(screen, { 
                        backgroundColor: 'var(--screen-bg)', 
                        duration: 0.1 
                    });
                }
            });
            
            if (item.submenu) {
                state.history.push(state.currentMenu);
                state.currentMenu = item.submenu;
                state.selectedIndex = 0;
                renderMenu();
            } else if (item.url) {
                playOpen();
                setTimeout(() => {
                    window.open(item.url, '_blank');
                }, 200);
            }
        }
        
        function handleBack() {
            if (state.history.length > 0) {
                playBack();
                state.currentMenu = state.history.pop();
                state.selectedIndex = 0;
                renderMenu();
            }
        }
        
        // === SOUND EFFECTS ===
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }
        
        function playTone(freq, duration, type = 'square', volume = 0.08) {
            try {
                const ctx = initAudio();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }
        
        function playBlip() { playTone(440, 0.05, 'square', 0.06); }
        function playSelect() { playTone(660, 0.05); setTimeout(() => playTone(880, 0.05), 50); }
        function playBack() { playTone(330, 0.05); }
        function playOpen() { playTone(523, 0.08); setTimeout(() => playTone(659, 0.08), 80); setTimeout(() => playTone(784, 0.12), 160); }
        
        // === EVENT LISTENERS ===
        // D-Pad
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                if (dir === 'up' || dir === 'down') {
                    navigate(dir);
                } else {
                    handleBack();
                }
            });
            btn.addEventListener('mousedown', () => btn.classList.add('pressed'));
            btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
        });
        
        // A/B Buttons
        document.querySelectorAll('.ab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (btn.dataset.action === 'a') {
                    handleSelect();
                } else {
                    handleBack();
                }
            });
            btn.addEventListener('mousedown', () => btn.classList.add('pressed'));
            btn.addEventListener('mouseup', () => btn.classList.remove('pressed'));
        });
        
        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') navigate('up');
            else if (e.key === 'ArrowDown') navigate('down');
            else if (e.key === 'Enter' || e.key === ' ') handleSelect();
            else if (e.key === 'Backspace' || e.key === 'Escape') handleBack();
        });
        
        // === INIT ===
        // Wait for DOM
        document.addEventListener('DOMContentLoaded', () => {
            renderMenu();
            // Check reduced motion
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                bootScreen.classList.add('hidden');
                document.getElementById('deviceContainer').classList.add('visible');
                document.getElementById('device').classList.add('revealed');
            } else {
                runBootSequence();
            }
        });
    </script>
