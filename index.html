<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Delano | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --device-purple: #1a1625;
            --device-purple-light: #2d2640;
            --device-purple-dark: #0f0d14;
            --screen-bg: #0d1a0d;
            --screen-green: #9bbc0f;
            --screen-green-dark: #0f380f;
            --screen-green-light: #8bac0f;
            --button-a: #e94560;
            --button-b: #e94560;
            --dpad: #15101d;
            --accent: #e94560;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #09090b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* === PHASE 1: DEVICE SHELL === */
        .device {
            width: 320px;
            background: linear-gradient(145deg, var(--device-purple-light), var(--device-purple-dark));
            border-radius: 24px 24px 60px 60px;
            padding: 20px;
            box-shadow: 
                0 0 0 3px var(--device-purple-dark),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
        }

        /* Screen bezel */
        .screen-bezel {
            background: #0a0810;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        /* Screen area */
        .screen {
            background: var(--screen-bg);
            border-radius: 8px;
            height: 200px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Scanlines */
        .screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.1) 2px,
                rgba(0,0,0,0.1) 4px
            );
            pointer-events: none;
        }

        /* Screen content */
        .screen-content {
            padding: 16px;
            color: var(--screen-green);
            font-size: 12px;
            line-height: 1.6;
        }

        .screen-header {
            text-align: center;
            border-bottom: 1px solid var(--screen-green-dark);
            padding-bottom: 8px;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .menu-item {
            padding: 6px 8px;
            border-radius: 4px;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .menu-item.selected {
            opacity: 1;
            background: var(--screen-green-dark);
            color: var(--screen-green-light);
        }

        .menu-item::before {
            content: '> ';
            opacity: 0;
        }

        .menu-item.selected::before {
            opacity: 1;
        }

        /* === PHASE 2: BUTTON LAYOUT === */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        /* D-Pad */
        .dpad {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .dpad-btn {
            position: absolute;
            background: var(--dpad);
            border: none;
            cursor: pointer;
            transition: all 0.1s;
        }

        .dpad-btn:active {
            transform: scale(0.95);
        }

        .dpad-up, .dpad-down {
            width: 28px;
            height: 32px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 6px;
            box-shadow: 0 2px 0 #0a0810;
        }

        .dpad-up { top: 0; }
        .dpad-down { bottom: 0; }

        .dpad-left, .dpad-right {
            width: 32px;
            height: 28px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 6px;
            box-shadow: 0 2px 0 #0a0810;
        }

        .dpad-left { left: 0; }
        .dpad-right { right: 0; }

        .dpad-center {
            position: absolute;
            width: 28px;
            height: 28px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--dpad);
            border-radius: 50%;
        }

        /* AB Buttons */
        .ab-buttons {
            display: flex;
            gap: 12px;
            transform: rotate(-15deg);
            margin-right: 10px;
        }

        .ab-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            box-shadow: 0 4px 0 #0a0810;
            transition: all 0.1s;
        }

        .ab-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #0a0810;
        }

        .btn-a { background: var(--button-a); }
        .btn-b { background: var(--button-b); }

        /* Start/Select */
        .meta-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .meta-btn {
            width: 50px;
            height: 12px;
            background: #15101d;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 0 #0a0810;
        }

        .meta-btn-label {
            text-align: center;
            font-size: 8px;
            color: #666;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Speaker */
        .speaker {
            position: absolute;
            right: 20px;
            bottom: 80px;
            display: grid;
            grid-template-columns: repeat(6, 4px);
            gap: 4px;
        }

        .speaker-dot {
            width: 4px;
            height: 4px;
            background: #0a0810;
            border-radius: 50%;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .device {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="device">
        <!-- PHASE 1: Screen -->
        <div class="screen-bezel">
            <div class="screen">
                <div class="screen-content">
                    <div class="screen-header">TYLER</div>
                    <div class="menu-item selected">Projects</div>
                    <div class="menu-item">Community</div>
                    <div class="menu-item">Contact</div>
                    <div class="menu-item">Social</div>
                </div>
            </div>
        </div>

        <!-- PHASE 2: D-Pad -->
        <div class="controls">
            <div class="dpad">
                <button class="dpad-btn dpad-up" data-dir="up" aria-label="Up"></button>
                <button class="dpad-btn dpad-down" data-dir="down" aria-label="Down"></button>
                <button class="dpad-btn dpad-left" data-dir="left" aria-label="Left"></button>
                <button class="dpad-btn dpad-right" data-dir="right" aria-label="Right"></button>
                <div class="dpad-center"></div>
            </div>

            <div class="ab-buttons">
                <button class="ab-btn btn-b" data-action="b">B</button>
                <button class="ab-btn btn-a" data-action="a">A</button>
            </div>
        </div>

        <div class="meta-buttons">
            <div>
                <button class="meta-btn" data-action="select"></button>
                <div class="meta-btn-label">SELECT</div>
            </div>
            <div>
                <button class="meta-btn" data-action="start"></button>
                <div class="meta-btn-label">START</div>
            </div>
        </div>

        <div class="speaker">
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
            <div class="speaker-dot"></div>
        </div>
    </div>

    <script>
        // === PHASE 5: D-PAD NAVIGATION ===
        const menuItems = document.querySelectorAll('.menu-item');
        let selectedIndex = 0;

        function updateSelection() {
            menuItems.forEach((item, i) => {
                item.classList.toggle('selected', i === selectedIndex);
            });
        }

        // D-pad navigation
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const dir = btn.dataset.dir;
                if (dir === 'up') {
                    selectedIndex = (selectedIndex - 1 + menuItems.length) % menuItems.length;
                } else if (dir === 'down') {
                    selectedIndex = (selectedIndex + 1) % menuItems.length;
                }
                updateSelection();
            });
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                selectedIndex = (selectedIndex - 1 + menuItems.length) % menuItems.length;
                updateSelection();
            } else if (e.key === 'ArrowDown') {
                selectedIndex = (selectedIndex + 1) % menuItems.length;
                updateSelection();
            }
        });

        // === TDD TESTS ===
        const tests = {
            passed: 0,
            failed: 0,
            results: []
        };

        function test(name, fn) {
            try {
                fn();
                tests.passed++;
                tests.results.push(`PASS: ${name}`);
            } catch (e) {
                tests.failed++;
                tests.results.push(`FAIL: ${name} - ${e.message}`);
            }
        }

        function assert(condition, message) {
            if (!condition) throw new Error(message);
        }

        // Run tests
        test('Device element exists', () => {
            assert(document.querySelector('.device') !== null, 'Device not found');
        });

        test('Screen exists', () => {
            assert(document.querySelector('.screen') !== null, 'Screen not found');
        });

        test('D-pad has 4 buttons', () => {
            const btns = document.querySelectorAll('.dpad-btn');
            assert(btns.length === 4, 'Expected 4 dpad buttons');
        });

        test('A and B buttons exist', () => {
            assert(document.querySelector('.btn-a') !== null, 'A button not found');
            assert(document.querySelector('.btn-b') !== null, 'B button not found');
        });

        test('Menu has 4 items', () => {
            const items = document.querySelectorAll('.menu-item');
            assert(items.length === 4, 'Expected 4 menu items');
        });

        test('Start and Select exist', () => {
            assert(document.querySelector('[data-action="start"]') !== null, 'Start not found');
            assert(document.querySelector('[data-action="select"]') !== null, 'Select not found');
        });

        test('Selection starts at 0', () => {
            assert(selectedIndex === 0, 'Initial selection should be 0');
        });

        test('Navigation wraps (down)', () => {
            selectedIndex = 3;
            // Simulate down press
            selectedIndex = (selectedIndex + 1) % menuItems.length;
            assert(selectedIndex === 0, 'Should wrap to 0');
        });

        test('Navigation wraps (up)', () => {
            selectedIndex = 0;
            // Simulate up press
            selectedIndex = (selectedIndex - 1 + menuItems.length) % menuItems.length;
            assert(selectedIndex === 3, 'Should wrap to 3');
        });

        // Output results
        console.log('=== TDD TEST RESULTS ===');
        tests.results.forEach(r => console.log(r));
        console.log(`\nTOTAL: ${tests.passed} passed, ${tests.failed} failed`);
        
        if (tests.failed > 0) {
            throw new Error('Tests failed!');
        }
    </script>
</body>
</html>
