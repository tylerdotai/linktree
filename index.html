<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler Delano | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gray-light: #c4c4c4;
            --gray: #9c9c9c;
            --gray-dark: #787878;
            --gray-darker: #5c5c5c;
            --screen-bg: #0f380f;
            --screen-green: #9bbc0f;
            --screen-green-light: #8bac0f;
            --screen-green-dark: #306230;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Press Start 2P', cursive;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container */
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === GAME BOY === */
        .gameboy {
            width: 340px;
            background: linear-gradient(180deg, var(--gray-light) 0%, var(--gray) 40%, var(--gray-dark) 100%);
            border-radius: 12px 12px 55px 55px;
            padding: 22px 20px 35px;
            box-shadow: 
                0 0 0 3px var(--gray-darker),
                0 35px 70px rgba(0, 0, 0, 0.6),
                inset 0 2px 0 rgba(255,255,255,0.4),
                inset 0 -3px 0 rgba(0,0,0,0.15);
            position: relative;
        }

        /* Top edge highlight */
        .gameboy::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 8%;
            right: 8%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
        }

        /* === SCREEN AREA === */
        .screen-section {
            display: flex;
            gap: 0;
            margin-bottom: 25px;
            align-items: flex-start;
        }

        /* Power/Battery LED - on bezel, to left of screen */
        .battery-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            margin-right: 4px;
        }

        .power-led {
            width: 6px;
            height: 6px;
            background: #1a1a1a;
            border-radius: 50%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }

        .power-led.on {
            background: #ff2020;
            box-shadow: 0 0 8px #ff2020, 0 0 15px rgba(255,32,32,0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .power-label {
            font-size: 4px;
            color: var(--gray-darker);
            margin-top: 3px;
            letter-spacing: 0.5px;
        }

        /* Screen housing - the dark gray bezel area */
        .screen-housing {
            background: #3a3a3a;
            border-radius: 6px 6px 25px 25px;
            padding: 10px 6px 10px 12px; /* Left padding bigger - screen shifted right */
            box-shadow: 
                inset 0 2px 6px rgba(0,0,0,0.8),
                0 1px 0 rgba(255,255,255,0.1);
        }

        /* Screen label */
        .screen-label {
            color: #6a6a6a;
            font-size: 5px;
            letter-spacing: 0.5px;
            text-align: center;
            margin-bottom: 6px;
        }

        /* The actual LCD screen - fills housing */
        .screen {
            background: var(--screen-bg);
            width: 160px;
            height: 144px;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }

        /* LCD pixel effect */
        .screen::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px),
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 2px 2px;
            pointer-events: none;
            z-index: 5;
        }

        /* Screen content */
        .screen-content {
            padding: 8px;
            color: var(--screen-green);
            font-size: 5px;
            line-height: 1.8;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 2px;
            margin-bottom: 4px;
            object-fit: cover;
        }

        .menu-title {
            font-size: 6px;
            margin-bottom: 6px;
            padding-bottom: 3px;
            border-bottom: 1px dashed var(--screen-green-dark);
            width: 100%;
            text-align: center;
        }

        .menu-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            width: 100%;
        }

        .menu-item {
            padding: 2px 4px;
            width: 100%;
            text-align: center;
            opacity: 0.5;
            cursor: pointer;
        }

        .menu-item.selected {
            opacity: 1;
            background: var(--screen-green);
            color: var(--screen-bg);
        }

        .menu-footer {
            font-size: 4px;
            margin-top: auto;
            opacity: 0.5;
            width: 100%;
            text-align: center;
        }

        /* === CONTROLS === */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        /* D-PAD */
        .dpad {
            position: relative;
            width: 85px;
            height: 85px;
        }

        .dpad-btn {
            position: absolute;
            background: #2d2d2d;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0 #151515, 0 5px 10px rgba(0,0,0,0.4);
        }

        .dpad-btn:active, .dpad-btn.pressed {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #151515;
        }

        .dpad-up { width: 26px; height: 28px; left: 50%; transform: translateX(-50%); top: 0; border-radius: 4px 4px 8px 8px; }
        .dpad-down { width: 26px; height: 28px; left: 50%; transform: translateX(-50%); bottom: 0; border-radius: 8px 8px 4px 4px; }
        .dpad-left { width: 28px; height: 26px; top: 50%; transform: translateY(-50%); left: 0; border-radius: 8px 4px 4px 8px; }
        .dpad-right { width: 28px; height: 26px; top: 50%; transform: translateY(-50%); right: 0; border-radius: 4px 8px 8px 4px; }
        
        .dpad-center {
            position: absolute;
            width: 26px;
            height: 26px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d2d;
            border-radius: 50%;
        }

        /* A/B BUTTONS */
        .ab-buttons {
            display: flex;
            gap: 8px;
            transform: rotate(-15deg);
            margin-right: 5px;
        }

        .ab-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: rgba(255,255,255,0.85);
            box-shadow: 0 4px 0 #5a0835, 0 5px 10px rgba(0,0,0,0.4);
        }

        .ab-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #5a0835;
        }

        .btn-a { background: linear-gradient(135deg, #b8126a, #8b0a50); margin-top: 8px; }
        .btn-b { background: linear-gradient(135deg, #b8126a, #8b0a50); margin-top: 0; }

        /* START/SELECT */
        .meta-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 22px;
            transform: rotate(-20deg);
        }

        .meta-btn {
            width: 32px;
            height: 8px;
            background: #3a3a3a;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 3px 0 #1a1a1a;
        }

        .meta-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 0 #1a1a1a;
        }

        .meta-label {
            font-size: 5px;
            color: var(--gray-darker);
            text-align: center;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* BRANDING */
        .branding {
            text-align: center;
            margin-top: 12px;
        }

        .brand {
            font-size: 8px;
            font-weight: bold;
            color: var(--gray-dark);
            letter-spacing: 1px;
        }

        .brand-dot {
            display: inline-block;
            width: 3px;
            height: 3px;
            background: #6a6ab5;
            border-radius: 50%;
            margin-left: 2px;
        }

        /* View Toggle */
        .view-toggle {
            margin-top: 60px;
            background: var(--gray-dark);
            border: none;
            color: #fff;
            padding: 10px 18px;
            border-radius: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 6px;
            cursor: pointer;
            box-shadow: 0 3px 15px rgba(0,0,0,0.4);
        }

        .view-toggle:hover {
            background: var(--gray);
        }

        /* List View */
        .list-view {
            display: none;
            width: 100%;
            max-width: 380px;
        }

        .list-view.active {
            display: block;
        }

        .list-section {
            margin-bottom: 14px;
        }

        .list-title {
            color: #888;
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .list-link {
            display: block;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 10px 12px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 5px;
            font-size: 9px;
            transition: all 0.2s;
        }

        .list-link:hover {
            background: rgba(233,69,96,0.2);
            border-color: #e94560;
        }

        /* Boot */
        .boot {
            position: fixed;
            inset: 0;
            background: var(--screen-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: bootOut 2.5s ease-out forwards;
        }

        @keyframes bootOut {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

        .boot-text {
            color: var(--screen-green);
            font-size: 6px;
            text-align: center;
            line-height: 2;
        }

        /* Mobile */
        @media (max-width: 380px) {
            .gameboy { width: 95%; }
            .screen { width: 140px; height: 126px; }
        }

        /* Touch */
        button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>
    <!-- Boot -->
    <div class="boot" id="boot">
        <div class="boot-text">
            FLUME<br>EST. 2026<br><br>TYLER DELANO
        </div>
    </div>

    <div class="container">
        <!-- Game Boy -->
        <div class="gameboy" id="gameboy">
            <!-- Screen Section: Battery LED + Screen -->
            <div class="screen-section">
                <!-- Battery LED on bezel -->
                <div class="battery-section">
                    <div class="power-led on"></div>
                    <div class="power-label">BATTERY</div>
                </div>
                
                <!-- Screen housing -->
                <div class="screen-housing">
                    <div class="screen-label">DOT MATRIX WITH STEREO SOUND</div>
                    <div class="screen" onclick="handleSelect()">
                        <div class="screen-content">
                            <img src="avatar.jpg" alt="Tyler" class="avatar">
                            <div class="menu-title" id="menuTitle">MENU</div>
                            <div class="menu-items" id="menuItems"></div>
                            <div class="menu-footer" id="menuFooter">A: SELECT B: BACK</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-row">
                <div class="dpad">
                    <button class="dpad-btn dpad-up" data-dir="up"></button>
                    <button class="dpad-btn dpad-down" data-dir="down"></button>
                    <button class="dpad-btn dpad-left" data-dir="left"></button>
                    <button class="dpad-btn dpad-right" data-dir="right"></button>
                    <div class="dpad-center"></div>
                </div>
                
                <div class="ab-buttons">
                    <button class="ab-btn btn-b" data-action="b">B</button>
                    <button class="ab-btn btn-a" data-action="a">A</button>
                </div>
            </div>

            <!-- Start/Select -->
            <div class="meta-buttons">
                <div>
                    <button class="meta-btn" data-action="select"></button>
                    <div class="meta-label">SELECT</div>
                </div>
                <div>
                    <button class="meta-btn" data-action="start" id="startBtn"></button>
                    <div class="meta-label">START</div>
                </div>
            </div>

            <!-- Branding -->
            <div class="branding">
                <div class="brand">CLAW BOY<span class="brand-dot"></span></div>
            </div>
        </div>

        <!-- View Toggle -->
        <button class="view-toggle" onclick="toggleView()">LIST VIEW</button>

        <!-- List View -->
        <div class="list-view" id="listView">
            <div class="list-section">
                <div class="list-title">Projects</div>
                <a href="https://flume.sh" class="list-link" target="_blank">Flume.sh</a>
                <a href="https://tylerdotai.github.io/personal-site" class="list-link" target="_blank">Terminal Portfolio</a>
                <a href="https://github.com/tylerdotai/proof" class="list-link" target="_blank">Proof</a>
            </div>
            <div class="list-section">
                <div class="list-title">Community</div>
                <a href="https://www.clawplex.dev" class="list-link" target="_blank">Clawplex</a>
                <a href="https://discord.gg/q8kEquTu3z" class="list-link" target="_blank">Discord</a>
            </div>
            <div class="list-section">
                <div class="list-title">Contact</div>
                <a href="mailto:tyler.delano@icloud.com" class="list-link">Email</a>
            </div>
            <div class="list-section">
                <div class="list-title">Social</div>
                <a href="https://linkedin.com/in/tylerpdelano" class="list-link" target="_blank">LinkedIn</a>
                <a href="https://twitter.com/tylerdotai" class="list-link" target="_blank">Twitter</a>
                <a href="https://github.com/tylerdotai" class="list-link" target="_blank">GitHub</a>
            </div>
            
            <button class="view-toggle" onclick="toggleView()">CLAW BOY</button>
        </div>
    </div>

    <script>
        // Menu Data
        const menus = {
            main: { title: 'MENU', items: [
                { label: 'Projects', sub: 'projects' },
                { label: 'Community', sub: 'community' },
                { label: 'Contact', sub: 'contact' },
                { label: 'Social', sub: 'social' }
            ]},
            projects: { title: 'PROJECTS', items: [
                { label: 'Flume.sh', url: 'https://flume.sh' },
                { label: 'Terminal', url: 'https://tylerdotai.github.io/personal-site' },
                { label: 'Proof', url: 'https://github.com/tylerdotai/proof' }
            ]},
            community: { title: 'COMMUNITY', items: [
                { label: 'Clawplex', url: 'https://www.clawplex.dev' },
                { label: 'Discord', url: 'https://discord.gg/q8kEquTu3z' }
            ]},
            contact: { title: 'CONTACT', items: [
                { label: 'Email', url: 'mailto:tyler.delano@icloud.com' }
            ]},
            social: { title: 'SOCIAL', items: [
                { label: 'LinkedIn', url: 'https://linkedin.com/in/tylerpdelano' },
                { label: 'Twitter', url: 'https://twitter.com/tylerdotai' },
                { label: 'GitHub', url: 'https://github.com/tylerdotai' }
            ]}
        };

        // State
        let current = 'main';
        let selected = 0;
        let history = [];

        // DOM
        const menuTitle = document.getElementById('menuTitle');
        const menuItems = document.getElementById('menuItems');
        const menuFooter = document.getElementById('menuFooter');

        // Render
        function render() {
            const m = menus[current];
            menuTitle.textContent = m.title;
            menuFooter.textContent = current === 'main' ? 'A: SELECT B: BACK' : 'A: OPEN B: BACK';
            
            menuItems.innerHTML = m.items.map((item, i) => 
                `<div class="menu-item ${i === selected ? 'selected' : ''}" onclick="selectItem(${i})">${item.label}</div>`
            ).join('');
        }

        function selectItem(i) { selected = i; handleSelect(); }

        // Actions
        function nav(dir) {
            const items = menus[current].items;
            if (dir === 'up') selected = (selected - 1 + items.length) % items.length;
            else if (dir === 'down') selected = (selected + 1) % items.length;
            playBlip();
            render();
        }

        function handleSelect() {
            const item = menus[current].items[selected];
            playSelect();
            
            if (item.sub) {
                history.push(current);
                current = item.sub;
                selected = 0;
            } else if (item.url) {
                playOpen();
                window.open(item.url, '_blank');
            }
            render();
        }

        function handleBack() {
            if (history.length) {
                playBack();
                current = history.pop();
                selected = 0;
                render();
            }
        }

        // Sound
        let audioCtx, soundOn = true;
        function init() { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        function tone(freq, dur, vol=0.08) {
            if (!soundOn || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }
        function playBlip() { tone(440, 0.05); }
        function playSelect() { tone(660, 0.05); setTimeout(() => tone(880, 0.05), 50); }
        function playBack() { tone(330, 0.05); }
        function playOpen() { tone(523, 0.08); setTimeout(() => tone(659, 0.08), 80); setTimeout(() => tone(784, 0.12), 160); }

        // View Toggle
        function toggleView() {
            const gb = document.getElementById('gameboy');
            const lv = document.getElementById('listView');
            const bt = document.querySelectorAll('.view-toggle');
            
            if (gb.style.display === 'none') {
                gb.style.display = 'block';
                lv.classList.remove('active');
                bt[0].textContent = 'LIST VIEW';
            } else {
                gb.style.display = 'none';
                lv.classList.add('active');
                bt[0].textContent = 'CLAW BOY';
            }
        }

        // Events
        document.querySelectorAll('.dpad-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                const d = btn.dataset.dir;
                if (d === 'up' || d === 'down') nav(d);
                else handleBack();
            };
            btn.onmousedown = () => btn.classList.add('pressed');
            btn.onmouseup = () => btn.classList.remove('pressed');
        });

        document.querySelectorAll('.ab-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                if (btn.dataset.action === 'a') handleSelect();
                else handleBack();
            };
        });

        document.querySelector('[data-action="start"]').onclick = toggleView;
        document.querySelector('[data-action="select"]').onclick = handleSelect;

        document.onkeydown = (e) => {
            if (e.key === 'ArrowUp') nav('up');
            else if (e.key === 'ArrowDown') nav('down');
            else if (e.key === 'Enter' || e.key === ' ') handleSelect();
            else if (e.key === 'Backspace' || e.key === 'Escape') handleBack();
            else if (e.key === 'Tab') { e.preventDefault(); toggleView(); }
        };

        // Init
        setTimeout(() => { document.getElementById('boot').style.display = 'none'; }, 2500);
        render();

        // Tests
        console.log('=== TESTS ===');
        console.log('Power LED position:', document.querySelector('.power-led').offsetParent.className);
        console.log('Screen in housing:', document.querySelector('.screen').parentElement.className);
    </script>
</body>
</html>
